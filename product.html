<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f6f8;
}

/* Container */
.container {
    max-width: 400px;
    margin: auto;
    padding: 15px;
}

/* Top Tabs */
.tabs {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding-bottom: 10px;
}

.tab {
    text-align: center;
    font-size: 12px;
    color: #666;
}

.tab.active {
    color: purple;
    border-bottom: 2px solid purple;
}

/* Product Card */
.card {
    background: #eee;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: contain;
}

/* Title */
.title {
    margin-top: 15px;
}

.title h3 {
    margin: 5px 0;
}

.subtitle {
    color: orange;
    font-size: 14px;
}

/* Price */
.price {
    color: #e53935;
    font-size: 22px;
    margin-top: 10px;
}

.delivery {
    float: right;
    font-size: 12px;
    color: #777;
}

/* Divider */
hr {
    margin: 20px 0;
    border: none;
    border-top: 1px solid #ddd;
}

/* Duration Buttons */
.duration {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.duration button {
    border-radius: 20px;
    border: 1px solid #ccc;
    padding: 8px 12px;
    background: white;
    cursor: pointer;
}

.duration button.active {
    border: 2px solid purple;
    color: purple;
}

/* Features */
.features {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    text-align: center;
}

.features div {
    font-size: 12px;
}

/* Bottom Bar */
.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #ddd;
}

.continue {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    color: white;
    background: linear-gradient(to right, orange, red);
    cursor: pointer;
}
.card img {
    width: 100%;
    height: 220px;
    object-fit: contain; /* OR use cover */
}
.tabs {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding: 10px 0;
}

.tab {
    text-align: center;
    min-width: 80px;
    font-size: 12px;
    color: #777;
}

.tab img {
    width: 40px;
    height: 60px;
    object-fit: contain;
    margin-bottom: 5px;
}

.tab.active span {
    color: purple;
    border-bottom: 2px solid purple;
    display: inline-block;
}
.slider {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    scroll-snap-type: x mandatory;
    padding: 10px 0;
}

.slide {
    min-width: 85%;
    background: #eee;
    border-radius: 20px;
    padding: 20px;
    scroll-snap-align: center;
}

.slide img {
    width: 100%;
    height: 220px;
    object-fit: contain;
}
</style>
</head>

<body>

<div class="container">

    <!-- Tabs -->
    <div class="tabs">

    <div class="tab active">
        <img src="asset/puri1.webp">
        <span>Bolt Copper</span>
    </div>

    <div class="tab">
        <img src="asset/puri1.webp">
        <span>Bolt Mineraliser</span>
    </div>

    <div class="tab">
        <img src="asset/puri1.webp">
        <span>Stealth Under Sink</span>
    </div>

    <div class="tab">
        <img src="asset/puri1.webp">
        <span>Zinger Copper Hot</span>
    </div>

</div>

    <!-- Product -->
    <div class="slider">

    <div class="slide">
        <img src="asset/puri1.webp">
    </div>

    <div class="slide">
        <img src="asset/puri1.webp">
    </div>

    <div class="slide">
        <img src="asset/puri1.webp">
    </div>

</div>

    <!-- Title -->
    <div class="title">
        <h3>bolt copper water purifier</h3>
        <div class="subtitle">ro+uv+mineraliser+Copper 29</div>
    </div>

    <!-- Price -->
    <div class="price">₹439/month
        <span class="delivery">delivery in 48-72 hours</span>
    </div>

    <hr>

    <!-- Duration -->
    <p>Select duration</p>

    <div class="duration">
        <button>28 Days</button>
        <button>3 Months</button>
        <button>6 Months</button>
        <button class="active">12 Months</button>
    </div>

    <!-- Features -->
    <div class="features">
        <div>6 stages<br>purification</div>
        <div>copper 29<br>cartridge</div>
        <div>mineralizer</div>
    </div>

</div>

<!-- Bottom -->
<div class="bottom">
    <div>
        <b>₹1499 + ₹5268</b><br>
        <small>subscription x12 months</small>
    </div>
   <a href="payment.html"> <button class="continue">Continue</button></a>
</div>

</body>
</html>
